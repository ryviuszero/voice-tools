name: Report a Tool Change
description: Report a pricing, feature, or policy change for an existing tool
title: "[Change] "
labels: ["data-update"]
body:
  - type: input
    id: tool
    attributes:
      label: Tool name / slug
      placeholder: e.g. elevenlabs
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - pricing_change
        - feature_added
        - product_change
        - model_release
        - policy_change
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What changed? (max 120 chars for changelog entry)
      placeholder: e.g. Starter plan price increased from $5 to $7/month
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Source URL
      placeholder: https://
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date of change (YYYY-MM-DD)
      placeholder: "2026-04-26"
    validations:
      required: true
